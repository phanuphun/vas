{% extends "base.html" %}
{% block content %}
<section class="logs-page">
  <article class="panel">
    <div class="section-header">
      <div>
        <h2>System Log Snapshots</h2>
        <p class="muted">{{ system_snapshot_dir }}</p>
      </div>
      <div class="action-row">
        <button class="secondary-action" id="refreshSystemLogs" type="button">Refresh</button>
        <button class="primary-action" id="collectSystemLog" type="button">Collect Snapshot</button>
      </div>
    </div>
    <div class="system-log-layout">
      <div class="log-list" id="systemSnapshotList">
        {% for snapshot in system_snapshots %}
        <button class="log-entry log-entry-button" data-system-snapshot="{{ snapshot.id }}" type="button">
          <span>
            <strong>{{ snapshot.id }}</strong>
            <small>{{ snapshot.path }} | {{ snapshot.size }} bytes</small>
          </span>
        </button>
        {% else %}
        <p class="muted">No system log snapshots collected yet.</p>
        {% endfor %}
      </div>
      <div class="system-log-viewer">
        <div class="system-log-viewer-header">
          <strong id="systemLogTitle">Select a snapshot</strong>
          <span class="muted" id="systemLogPath"></span>
        </div>
        <pre class="config-file-content system-log-content" id="systemLogContent">System log content will appear here.</pre>
      </div>
    </div>
  </article>
</section>

<script>
const systemList = document.getElementById("systemSnapshotList");
const systemTitle = document.getElementById("systemLogTitle");
const systemPath = document.getElementById("systemLogPath");
const systemContent = document.getElementById("systemLogContent");

function renderSystemSnapshots(snapshots) {
  if (!snapshots.length) {
    systemList.innerHTML = '<p class="muted">No system log snapshots collected yet.</p>';
    return;
  }
  systemList.innerHTML = snapshots.map((snapshot) => `
    <button class="log-entry log-entry-button" data-system-snapshot="${escapeHtml(snapshot.id || "")}" type="button">
      <span>
        <strong>${escapeHtml(snapshot.id || "")}</strong>
        <small>${escapeHtml(snapshot.path || "")} | ${Number(snapshot.size || 0)} bytes</small>
      </span>
    </button>
  `).join("");
}

async function refreshSystemLogs() {
  const response = await fetch("{{ url_for('logs_system_api') }}");
  const data = await response.json();
  renderSystemSnapshots(data.snapshots || []);
}

async function collectSystemLog() {
  systemContent.textContent = "Collecting system logs...";
  const response = await fetch("{{ url_for('logs_system_snapshot_api') }}", { method: "POST" });
  const data = await response.json();
  if (!response.ok) {
    systemContent.textContent = (data.errors || ["Failed to collect system logs."]).join("\n");
    return;
  }
  await refreshSystemLogs();
  await showSystemSnapshot(data.snapshot.id);
}

async function showSystemSnapshot(snapshotId) {
  const response = await fetch(`/api/logs/system/${encodeURIComponent(snapshotId)}`);
  const data = await response.json();
  if (!response.ok) {
    systemTitle.textContent = "Read error";
    systemPath.textContent = "";
    systemContent.textContent = (data.errors || ["Failed to read system snapshot."]).join("\n");
    return;
  }
  systemTitle.textContent = data.snapshot.id;
  systemPath.textContent = data.snapshot.path;
  systemContent.textContent = data.snapshot.content;
}

function escapeHtml(value) {
  return String(value)
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;")
    .replace(/'/g, "&#039;");
}

document.getElementById("refreshSystemLogs").addEventListener("click", refreshSystemLogs);
document.getElementById("collectSystemLog").addEventListener("click", collectSystemLog);
systemList.addEventListener("click", (event) => {
  const button = event.target.closest("[data-system-snapshot]");
  if (button) {
    showSystemSnapshot(button.dataset.systemSnapshot);
  }
});
</script>
{% endblock %}
