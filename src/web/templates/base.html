<!doctype html>
<html lang="th">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block page_title %}{{ title or "Vending Auto Setup" }}{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Bai+Jamjuree:wght@400;500;600;700&family=Anuphan:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="{{ url_for('static', filename='homeoffice.css') }}">
  </head>
  <body>
    <div class="sidebar-overlay" id="overlay" onclick="closeSidebar()"></div>

    <div class="app-root">
      <!-- Sidebar -->
      <aside class="sidebar hair-r" id="sidebar">
        <div class="sidebar-brand hair-b">
          <div class="brand-mark">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <rect x="2" y="3" width="20" height="14" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/>
            </svg>
          </div>
          <div class="brand-text">
            <div class="brand-name font-display">VAS</div>
            <div class="brand-sub">Vending Auto Setup</div>
          </div>
          <button class="sidebar-close" onclick="closeSidebar()" aria-label="ปิดเมนู">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
          </button>
        </div>
        <nav class="sidebar-nav">
          <div class="nav-section">
            <span class="cf-eyebrow nav-heading">เมนูหลัก</span>
            <a class="nav-item {{ 'active' if request.endpoint == 'dashboard' else '' }}" href="{{ url_for('dashboard') }}">
              <span class="nav-icon"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg></span>
              <span class="nav-label">แดชบอร์ด</span>
            </a>
            <a class="nav-item {{ 'active' if request.endpoint == 'display_settings' else '' }}" href="{{ url_for('display_settings') }}">
              <span class="nav-icon"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="3" width="20" height="14" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg></span>
              <span class="nav-label">จอแสดงผล</span>
            </a>
            <a class="nav-item {{ 'active' if request.endpoint == 'wireguard' else '' }}" href="{{ url_for('wireguard') }}">
              <span class="nav-icon"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg></span>
              <span class="nav-label">VPN</span>
            </a>
            <a class="nav-item {{ 'active' if request.endpoint == 'logs' else '' }}" href="{{ url_for('logs') }}">
              <span class="nav-icon"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg></span>
              <span class="nav-label">บันทึกระบบ</span>
            </a>
            <a class="nav-item {{ 'active' if request.endpoint == 'commands' else '' }}" href="{{ url_for('commands') }}">
              <span class="nav-icon"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="4 17 10 11 4 5"/><line x1="12" y1="19" x2="20" y2="19"/></svg></span>
              <span class="nav-label">คำสั่ง CLI</span>
            </a>
            <a class="nav-item {{ 'active' if request.endpoint == 'qr_reader_page' else '' }}" href="{{ url_for('qr_reader_page') }}">
              <span class="nav-icon">
                <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <rect x="3" y="3" width="7" height="7"/>
                  <rect x="14" y="3" width="7" height="7"/>
                  <rect x="3" y="14" width="7" height="7"/>
                  <path d="M14 14h3v3h-3z"/>
                  <path d="M17 17h4"/>
                  <path d="M17 21v-4"/>
                </svg>
              </span>
              <span class="nav-label">QR Reader</span>
            </a>
          </div>
        </nav>
        <div class="sidebar-footer hair-t">
          <div style="display:flex;align-items:center;gap:0.5rem;">
            <div class="cf-ava" style="background:rgb(var(--c-accent)/0.10);color:rgb(var(--c-accent))">VM</div>
            <div>
              <div style="font-size:0.78rem;font-weight:600;color:rgb(var(--c-ink))">{{ machine_name or "VAS" }}</div>
              <div style="font-size:0.62rem;color:rgb(var(--c-faint))">VAS</div>
            </div>
          </div>
        </div>
      </aside>

      <!-- Main column -->
      <div class="app-column">
        <header class="app-header hair-b">
          <div class="header-inner">
            <button class="menu-btn" onclick="openSidebar()" aria-label="เปิดเมนู">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
                <line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/>
              </svg>
            </button>
            <span class="page-title">{% block header_title %}VAS{% endblock %}</span>
            <div style="flex:1;"></div>
            {% block header_actions %}{% endblock %}
          </div>
        </header>
        <main class="ho-main">
          <div class="content-inner">
            {% block content %}{% endblock %}
          </div>
        </main>
      </div>
    </div>

    <script src="{{ url_for('static', filename='js/app.js') }}"></script>
    {% block extra_scripts %}{% endblock %}
  </body>
</html>
