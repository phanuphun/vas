<!doctype html>
<html lang="th">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>เข้าสู่ระบบ — VAS</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bai+Jamjuree:wght@400;500;600;700&family=Anuphan:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            ink:     'rgb(var(--c-ink)     / <alpha-value>)',
            muted:   'rgb(var(--c-muted)   / <alpha-value>)',
            faint:   'rgb(var(--c-faint)   / <alpha-value>)',
            accent:  'rgb(var(--c-accent)  / <alpha-value>)',
            card:    'rgb(var(--c-card)    / <alpha-value>)',
            surface: 'rgb(var(--c-surface) / <alpha-value>)',
            page:    'rgb(var(--c-page)    / <alpha-value>)',
            danger:  'rgb(var(--c-danger)  / <alpha-value>)',
            line:    'rgb(var(--c-line)    / <alpha-value>)',
          },
          fontFamily: {
            display: ['Bai Jamjuree', 'sans-serif'],
            body: ['Anuphan', 'system-ui', 'sans-serif'],
          },
        }
      }
    }
  </script>
  <style>
    :root {
      --c-ink:     26 32 50;
      --c-muted:   74 80 99;
      --c-faint:  140 146 165;
      --c-line:    26 32 50;
      --c-accent:  37 99 235;
      --c-card:   255 255 255;
      --c-surface: 248 249 251;
      --c-page:   246 247 250;
      --c-danger:  239 68 68;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Anuphan', system-ui, sans-serif; font-size: 15px; line-height: 1.55; -webkit-font-smoothing: antialiased; }
    @keyframes fadeUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    .fade-up { animation: fadeUp 0.3s ease forwards; }
  </style>
</head>
<body class="bg-page text-ink min-h-screen flex items-center justify-center px-4">

  <div class="w-full max-w-[400px] fade-up">

    <!-- Card -->
    <div class="bg-card border border-line/10 rounded-2xl p-7">

      <!-- Brand row -->
      <div class="flex items-center gap-2.5 pb-5 border-b border-line/10 mb-6">
        <div class="w-8 h-8 rounded-lg bg-accent flex items-center justify-center flex-shrink-0">
          <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="2" y="3" width="20" height="14" rx="2"/>
            <line x1="8" y1="21" x2="16" y2="21"/>
            <line x1="12" y1="17" x2="12" y2="21"/>
          </svg>
        </div>
        <span class="font-display text-[1.1rem] font-bold text-ink">VAS</span>
      </div>

      <!-- Heading -->
      <h1 class="font-display text-[1.5rem] font-bold text-ink mb-6">ยินดีต้อนรับกลับ, เข้าสู่ระบบ</h1>

      {% if error %}
      <div class="flex items-center gap-2 px-3 py-2.5 rounded-lg bg-danger/8 border border-danger/20 mb-5">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="rgb(239 68 68)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="flex-shrink-0">
          <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>
        </svg>
        <span class="text-[0.82rem] text-danger font-medium">{{ error }}</span>
      </div>
      {% endif %}

      <form method="POST" action="{{ url_for('auth_login') }}" class="flex flex-col gap-5">
        <input type="hidden" name="next" value="{{ next or '' }}">

        <div class="flex flex-col gap-1.5">
          <label class="text-[0.78rem] font-semibold text-ink">ชื่อผู้ใช้</label>
          <input type="text" name="username" value="{{ username or '' }}" autocomplete="username"
                 placeholder="username"
                 required autofocus
                 class="w-full px-3.5 py-2.5 border border-line/15 rounded-xl bg-card text-ink text-[0.9rem]
                        outline-none focus:border-accent/60 focus:ring-2 focus:ring-accent/10
                        placeholder:text-faint transition">
        </div>

        <div class="flex flex-col gap-1.5">
          <label class="text-[0.78rem] font-semibold text-ink">รหัสผ่าน</label>
          <div class="relative">
            <input type="password" name="password" id="password-field" autocomplete="current-password"
                   placeholder="••••••••" required
                   class="w-full px-3.5 py-2.5 pr-10 border border-line/15 rounded-xl bg-card text-ink text-[0.9rem]
                          outline-none focus:border-accent/60 focus:ring-2 focus:ring-accent/10
                          placeholder:text-faint transition">
            <button type="button" onclick="togglePw()" tabindex="-1"
                    class="absolute right-3 top-1/2 -translate-y-1/2 text-faint hover:text-ink transition-colors p-0.5">
              <svg id="eye-open" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
              </svg>
              <svg id="eye-closed" class="hidden" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/>
              </svg>
            </button>
          </div>
        </div>

        <button type="submit"
                class="w-full flex items-center justify-center gap-2 py-3 mt-1 bg-accent text-white font-semibold text-[0.9rem] rounded-xl
                       hover:bg-blue-700 active:scale-[0.99] transition-all min-h-[44px]">
          เข้าสู่ระบบ
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/>
          </svg>
        </button>
      </form>

      <p class="text-center text-[0.82rem] text-muted mt-6">
        ยังไม่มีบัญชี? <a href="#" class="text-accent font-semibold underline underline-offset-2">สมัครสมาชิก</a>
      </p>
    </div>

    <p class="text-center text-[0.72rem] text-faint mt-5">VAS · Vending Auto Setup</p>
  </div>

  <script>
    function togglePw() {
      var f = document.getElementById('password-field');
      var open = document.getElementById('eye-open');
      var closed = document.getElementById('eye-closed');
      if (f.type === 'password') {
        f.type = 'text';
        open.classList.add('hidden');
        closed.classList.remove('hidden');
      } else {
        f.type = 'password';
        open.classList.remove('hidden');
        closed.classList.add('hidden');
      }
    }
  </script>
</body>
</html>
